[project]
name = "lexguard-ai"
version = "0.1.0"
description = "AI provider abstractions for LEXGUARD"
requires-python = ">=3.12"
dependencies = [
    "lexguard-shared",
    "google-genai>=1.5.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lexguard_ai"]

[tool.uv.sources]
lexguard-shared = { workspace = true }
