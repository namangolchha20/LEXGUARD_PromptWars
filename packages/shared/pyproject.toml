[project]
name = "lexguard-shared"
version = "0.1.0"
description = "Shared types and schemas for LEXGUARD"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.10.0",
    "pydantic-settings>=2.7.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lexguard_shared"]
