[project]
name = "lexguard-orchestrator"
version = "0.1.0"
description = "Multi-agent orchestration for LEXGUARD"
requires-python = ">=3.12"
dependencies = [
    "lexguard-shared",
    "lexguard-ai",
    "lexguard-ingestion",
    "lexguard-agents",
    "lexguard-risk",
    "lexguard-benchmark",
    "aiofiles>=24.1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lexguard_orchestrator"]

[tool.uv.sources]
lexguard-shared = { workspace = true }
lexguard-ai = { workspace = true }
lexguard-ingestion = { workspace = true }
lexguard-agents = { workspace = true }
lexguard-risk = { workspace = true }
lexguard-benchmark = { workspace = true }
