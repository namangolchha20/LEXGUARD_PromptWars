[project]
name = "lexguard-benchmark"
version = "0.1.0"
description = "Industry benchmark comparison engine for LEXGUARD"
requires-python = ">=3.12"
dependencies = [
    "lexguard-shared",
    "lexguard-ai",
    "aiofiles>=24.1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lexguard_benchmark"]

[tool.hatch.build.targets.wheel.force-include]
"src/lexguard_benchmark/data" = "lexguard_benchmark/data"

[tool.uv.sources]
lexguard-shared = { workspace = true }
lexguard-ai = { workspace = true }
