[project]
name = "lexguard-risk"
version = "0.1.0"
description = "Legal risk analysis engine for LEXGUARD"
requires-python = ">=3.12"
dependencies = [
    "lexguard-shared",
    "lexguard-ai",
    "aiofiles>=24.1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lexguard_risk"]

[tool.uv.sources]
lexguard-shared = { workspace = true }
lexguard-ai = { workspace = true }
