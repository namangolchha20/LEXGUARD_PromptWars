services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lexguard
      POSTGRES_PASSWORD: lexguard
      POSTGRES_DB: lexguard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lexguard"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://lexguard:lexguard@postgres:5432/lexguard
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/apps/api/src:ro
      - ./packages:/app/packages:ro

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000
      NEXT_PUBLIC_WS_URL: ws://api:8000
    depends_on:
      - api

  analyze-worker:
    build:
      context: .
      dockerfile: workers/analyze-worker/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://lexguard:lexguard@postgres:5432/lexguard
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./workers/analyze-worker/src:/app/workers/analyze-worker/src:ro
      - ./packages:/app/packages:ro

volumes:
  postgres_data:
